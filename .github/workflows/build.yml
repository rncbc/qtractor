name: Build Nebula Quasar

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    name: macOS ARM64 Build
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Dependencies
      run: |
        brew install qt@6 cmake pkg-config libsamplerate libsndfile rubberband liblo zlib lv2 lilv suil
        # Set paths for keg-only zlib
        export LDFLAGS="-L/opt/homebrew/opt/zlib/lib"
        export CPPFLAGS="-I/opt/homebrew/opt/zlib/include"
        export PKG_CONFIG_PATH="/opt/homebrew/opt/zlib/lib/pkgconfig:$PKG_CONFIG_PATH"
        # CLAP SDK - use the correct repo (free-audio/clap)
        git clone --depth 1 https://github.com/free-audio/clap.git /tmp/clap
        mkdir -p /usr/local/include
        cp -r /tmp/clap/include/clap /usr/local/include/
    
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCONFIG_QT6=ON \
          -DCONFIG_LADSPA=OFF \
          -DCONFIG_DSSI=OFF \
          -DCONFIG_AU=ON \
          -DCONFIG_VST2=ON \
          -DCONFIG_VST3=ON \
          -DCONFIG_LV2=ON \
          -DCONFIG_CLAP=ON \
          -DCMAKE_OSX_ARCHITECTURES=arm64
    
    - name: Build
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)
    
    - name: Create DMG
      run: |
        cd build
        hdiutil create -volname "NebulaQuasar" -srcfolder "src/NebulaQuasar.app" -ov -format UDZO ../NebulaQuasar-macOS-arm64.dmg
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NebulaQuasar-macOS-arm64
        path: NebulaQuasar-macOS-arm64.dmg

  build-macos-x86_64:
    runs-on: macos-13
    name: macOS x86_64 Build
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Dependencies
      run: |
        brew install qt@6 cmake pkg-config libsamplerate libsndfile rubberband liblo zlib lv2 lilv suil
        # Set paths for keg-only zlib (Intel Mac path)
        export LDFLAGS="-L/usr/local/opt/zlib/lib"
        export CPPFLAGS="-I/usr/local/opt/zlib/include"
        export PKG_CONFIG_PATH="/usr/local/opt/zlib/lib/pkgconfig:$PKG_CONFIG_PATH"
        # CLAP SDK - use the correct repo (free-audio/clap)
        git clone --depth 1 https://github.com/free-audio/clap.git /tmp/clap
        mkdir -p /usr/local/include
        cp -r /tmp/clap/include/clap /usr/local/include/
    
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCONFIG_QT6=ON \
          -DCONFIG_LADSPA=OFF \
          -DCONFIG_DSSI=OFF \
          -DCONFIG_AU=ON \
          -DCONFIG_VST2=ON \
          -DCONFIG_VST3=ON \
          -DCONFIG_LV2=ON \
          -DCONFIG_CLAP=ON \
          -DCMAKE_OSX_ARCHITECTURES=x86_64
    
    - name: Build
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)
    
    - name: Create DMG
      run: |
        cd build
        hdiutil create -volname "NebulaQuasar" -srcfolder "src/NebulaQuasar.app" -ov -format UDZO ../NebulaQuasar-macOS-x86_64.dmg
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NebulaQuasar-macOS-x86_64
        path: NebulaQuasar-macOS-x86_64.dmg

  build-windows-x86_64:
    runs-on: windows-latest
    name: Windows x86_64 Build
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Dependencies via vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git --depth 1
        cd vcpkg
        .\bootstrap-vcpkg.bat
        # Note: lv2, lilv, suil are not available in vcpkg - LV2 support disabled on Windows
        .\vcpkg install qtbase:x64-windows qttools:x64-windows libsndfile:x64-windows rubberband:x64-windows zlib:x64-windows clap:x64-windows samplerate:x64-windows liblo:x64-windows steinberg-vst3-sdk:x64-windows
        echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $env:GITHUB_ENV
        
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. `
          -DCMAKE_BUILD_TYPE=Release `
          -DCONFIG_QT6=ON `
          -DCONFIG_LADSPA=OFF `
          -DCONFIG_DSSI=OFF `
          -DCONFIG_WASAPI=ON `
          -DCONFIG_WAVERT=ON `
          -DCONFIG_ASIO=OFF `
          -DCONFIG_VST2=ON `
          -DCONFIG_VST3=ON `
          -DCONFIG_LV2=ON `
          -DCONFIG_CLAP=ON `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
    
    - name: Build
      run: |
        cd build
        cmake --build . --config Release -j $env:NUMBER_OF_PROCESSORS
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NebulaQuasar-Windows-x86_64
        path: build/src/Release/*.exe
